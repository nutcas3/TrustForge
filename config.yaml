server:
  grpc_port: 50051
  rest_port: 8080
  read_timeout: 30s
  write_timeout: 60s

database:
  host: localhost
  port: 5432
  name: trustforge
  user: trustforge
  password: changeme
  max_conns: 20

firecracker:
  binary_path: /usr/local/bin/firecracker
  jailer_path: /usr/local/bin/jailer
  socket_dir: /var/run/trustforge/sockets
  image_dir: /var/lib/trustforge/images
  base_image_path: /var/lib/trustforge/images/base.ext4
  task_disk_dir: /var/lib/trustforge/tasks
  snapshot_dir: /var/lib/trustforge/snapshots
  kernel_path: /var/lib/trustforge/vmlinux
  vcpu_count: 1
  mem_size_mib: 128
  execution_timeout: 30s
  jailer_uid: 1001
  jailer_gid: 1001

worker:
  pool_size: 50
  queue_depth: 500
  warm_snapshot_count: 10

llm:
  api_key: "${ANTHROPIC_API_KEY}"
  model: claude-sonnet-4-20250514
  max_tokens: 2048
  risk_threshold: 0.70

storage:
  task_disk_size: 10485760  # 10MB
